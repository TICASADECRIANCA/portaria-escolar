<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portaria Escolar - Segurança</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --danger: #d93025; --success: #188038; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f3f4; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background: white; padding: 25px; border-radius: 12px; shadow: 0 4px 12px rgba(0,0,0,0.1); }
        
        /* Tela de Login Simples */
        #tela-login { text-align: center; padding: 50px 20px; }
        
        /* Interface de Busca */
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #dadce0; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        /* Card do Aluno */
        .card-liberacao { background: #fff; border: 2px solid var(--primary); border-radius: 15px; padding: 20px; margin-top: 20px; animation: fadeIn 0.3s; }
        .nome-aluno { font-size: 26px; color: var(--danger); font-weight: bold; text-transform: uppercase; display: block; }
        .autorizados-lista { margin-top: 15px; background: #e8f0fe; padding: 15px; border-radius: 10px; }
        .autorizado-item { font-size: 18px; color: #202124; font-weight: 600; padding: 8px 0; border-bottom: 1px solid #d0d7de; }
        .autorizado-item:last-child { border: none; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-blue { background: var(--primary); color: white; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="area-login">
        <h2>Acesso à Portaria</h2>
        <input type="password" id="senha-acesso" placeholder="Digite a senha da escola">
        <button class="btn btn-blue" onclick="verificarSenha()">ENTRAR</button>
    </div>

    <div id="area-sistema" class="hidden">
        <div class="header">
            <h3>SISTEMA DE SAÍDA</h3>
            <button onclick="location.reload()" style="float: right; font-size: 10px;">Sair</button>
        </div>
        
        <input type="text" id="busca" placeholder="🔎 Nome do Aluno...">
        
        <div id="resultado"></div>

        <hr style="margin-top: 50px; opacity: 0.3;">
        <div style="font-size: 12px; color: #666; text-align: center;">
            <p>Para importar nova lista, use a função abaixo:</p>
            <input type="file" id="csvFile" accept=".csv">
            <button onclick="importarCSV()" style="font-size: 10px;">Importar CSV</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC67PDC576cb9FSbwExmG5RTRIaevM0vPE",
        authDomain: "portaria-escolar-f9226.firebaseapp.com",
        projectId: "portaria-escolar-f9226",
        storageBucket: "portaria-escolar-f9226.firebasestorage.app",
        messagingSenderId: "1024003667592",
        appId: "1:1024003667592:web:4faf498c3f39999f75113d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Senha simples para evitar curiosos
    window.verificarSenha = function() {
        const senha = document.getElementById('senha-acesso').value;
        if(senha === "1234") { // ALTERE SUA SENHA AQUI
            document.getElementById('area-login').classList.add('hidden');
            document.getElementById('area-sistema').classList.remove('hidden');
        } else {
            alert("Senha incorreta!");
        }
    }

    // Busca Aluno
    document.getElementById('busca').addEventListener('input', async (e) => {
        const termo = e.target.value.toLowerCase();
        const divRes = document.getElementById('resultado');
        if (termo.length < 3) { divRes.innerHTML = ""; return; }

        const q = query(collection(db, "alunos"));
        const snap = await getDocs(q);
        divRes.innerHTML = "";

        snap.forEach(doc => {
            const d = doc.data();
            if (d.aluno.toLowerCase().includes(termo)) {
                divRes.innerHTML += `
                    <div class="card-liberacao">
                        <span class="nome-aluno">${d.aluno}</span>
                        <p><strong>Mãe:</strong> ${d.mae} | <strong>Pai:</strong> ${d.pai}</p>
                        <div class="autorizados-lista">
                            <strong>Pessoas Autorizadas:</strong>
                            <div class="autorizado-item">1. ${d.autorizado1 || '-'}</div>
                            <div class="autorizado-item">2. ${d.autorizado2 || '-'}</div>
                            <div class="autorizado-item">3. ${d.autorizado3 || '-'}</div>
                            <div class="autorizado-item">4. ${d.autorizado4 || '-'}</div>
                        </div>
                    </div>
                `;
            }
        });
    });

    // Importar CSV
    window.importarCSV = function() {
        const file = document.getElementById('csvFile').files[0];
        if(!file) return alert("Selecione o arquivo!");

        Papa.parse(file, {
            header: true,
            complete: async (results) => {
                for (const item of results.data) {
                    await addDoc(collection(db, "alunos"), item);
                }
                alert("Lista importada!");
                location.reload();
            }
        });
    }
</script>

</body>
</html>
