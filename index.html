<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Segura | Portaria Casa de Criança</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --danger: #d93025;
            --health: #00897b;
            --whatsapp: #25d366;
            --bg-overlay: rgba(248, 249, 250, 0.94);
            --white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
            background-color: #dfebf7;
            /* COLOQUE SUA IMAGEM ABAIXO */
            background-image: url("NOME_DO_SEU_ARQUIVO.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: flex-start;
        }

        .container { 
            width: 100%; max-width: 1300px; margin: 20px; 
            background: var(--bg-overlay); padding: 25px; border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); backdrop-filter: blur(8px);
        }
        
        /* --- TELAS DE ACESSO (LOGIN) --- */
        #tela-login-inicial {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(26,115,232,0.9) 0%, rgba(162,196,245,0.9) 100%);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        
        .login-box {
            background: var(--white); padding: 40px; border-radius: 24px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); width: 90%; max-width: 450px;
        }

        .btn-escolha {
            width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 15px;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-enfermagem { background: var(--health); color: white; }
        .btn-espera { background: var(--primary); color: white; }
        .btn-escolha:hover { opacity: 0.9; transform: scale(1.02); }

        .btn-voltar {
            background: #eee; color: #555; padding: 10px 20px; border: none; border-radius: 10px;
            cursor: pointer; margin-top: 20px; font-weight: bold; width: 100%;
        }

        /* --- INTERFACE DO SISTEMA --- */
        .header-sistema { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .header-sistema h1 { font-size: 32px; color: var(--primary); margin: 0; font-weight: 800; }
        .icon-casa-cadeado { width: 45px; height: 45px; fill: var(--primary); }

        .search-box { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; text-align: center; }
        input[type="text"], input[type="password"] { 
            width: 100%; padding: 18px; border: 2px solid #e0e0e0; border-radius: 15px; font-size: 20px; outline: none; box-sizing: border-box;
        }

        .resultado-wrapper { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: var(--white); border-radius: 20px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); flex: 1; min-width: 350px; max-width: 600px; position: relative; }
        .card-aluno { border-top: 10px solid var(--primary); }
        .card-saude { border-top: 10px solid var(--health); }

        .aluno-nome { font-size: 28px; font-weight: 800; color: var(--danger); display: block; text-transform: uppercase; }
        .label { font-size: 11px; text-transform: uppercase; color: #70757a; font-weight: 800; display: block; margin-top: 12px; }
        .data { font-size: 16px; color: #202124; font-weight: 600; }

        .grid-auth { display: grid; gap: 8px; margin-top: 10px; background: #f1f8ff; padding: 15px; border-radius: 12px; }
        .auth-row { border-bottom: 1px solid #d0e3ff; padding: 8px 0; }
        .acoes-contato { display: flex; gap: 8px; margin-top: 5px; }
        .btn-link { text-decoration: none; font-size: 11px; font-weight: bold; padding: 5px 10px; border-radius: 8px; display: flex; align-items: center; gap: 5px; }
        .btn-tel { background: #e8f0fe; color: var(--primary); }
        .btn-wpp { background: #e6fcf0; color: var(--whatsapp); }

        .btn-sair { background: #fdeaea; color: var(--danger); padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; position: absolute; top: 20px; right: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="tela-login-inicial">
    <div id="step-escolha" class="login-box">
        <svg class="icon-casa-cadeado" viewBox="0 0 24 24" style="width:70px; margin-bottom:15px;"><path d="M12 3L2 12h3v9h6v-6h2v6h6v-9h3L12 3z"/></svg>
        <h1 style="color:var(--primary); margin-bottom:30px;">Casa Segura</h1>
        <button class="btn-escolha btn-enfermagem" onclick="irParaSenha('enfermagem')">⚕️ ENFERMAGEM</button>
        <button class="btn-escolha btn-espera" onclick="irParaSenha('espera')">🛋️ SALA DE ESPERA</button>
    </div>

    <div id="step-senha" class="login-box hidden">
        <h2 id="titulo-senha" style="margin-bottom:20px;">Senha</h2>
        <input type="password" id="campo-senha" placeholder="Digite a senha...">
        <button class="btn-escolha btn-espera" style="margin-top:15px;" onclick="validarSenha()">ENTRAR</button>
        <button class="btn-voltar" onclick="voltarParaEscolha()">← Voltar</button>
    </div>
</div>

<div class="container hidden" id="main-sistema">
    <button class="btn-sair" onclick="sairDoSistema()">🚪 Sair</button>
    
    <div class="search-box">
        <div class="header-sistema">
            <svg class="icon-casa-cadeado" viewBox="0 0 24 24" style="width:40px;"><path d="M12 3L2 12h3v9h6v-6h2v6h6v-9h3L12 3z"/></svg>
            <h1>Casa Segura</h1>
        </div>
        <p style="color: #70757a; margin-bottom: 20px;">Portaria Casa de Criança | Acesso: <b id="label-acesso"></b></p>
        <input type="text" id="busca" placeholder="🔍 Digite o nome do aluno...">
        
        <div id="adm-btn-wrapper" class="hidden" style="margin-top:15px;">
            <button class="btn-voltar" style="width:auto; margin:0;" onclick="toggleAdmin()">⚙️ Admin (CSV)</button>
        </div>
    </div>

    <div id="resultado" class="resultado-wrapper"></div>

    <div id="painel-adm" class="hidden" style="text-align:center;">
        <div class="card" style="margin:auto; border: 2px dashed var(--primary); max-width: 500px;">
            <h3>Importação de Dados</h3>
            <input type="file" id="csvFile" accept=".csv" style="margin: 20px 0;">
            <button class="btn-escolha btn-espera" onclick="importarCSV()">IMPORTAR CSV</button>
            <button class="btn-voltar" style="background:var(--danger); color:white;" onclick="limparBaseDados()">LIMPAR TUDO</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC67PDC576cb9FSbwExmG5RTRIaevM0vPE",
        authDomain: "portaria-escolar-f9226.firebaseapp.com",
        projectId: "portaria-escolar-f9226",
        storageBucket: "portaria-escolar-f9226.firebasestorage.app",
        messagingSenderId: "1024003667592",
        appId: "1:1024003667592:web:4faf498c3f39999f75113d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let unsubscribe = null;
    let perfilSelecionado = '';

    // NAVEGAÇÃO
    window.irParaSenha = (perfil) => {
        perfilSelecionado = perfil;
        document.getElementById('step-escolha').classList.add('hidden');
        document.getElementById('step-senha').classList.remove('hidden');
        document.getElementById('titulo-senha').innerText = perfil === 'enfermagem' ? 'Acesso Enfermagem' : 'Acesso Sala de Espera';
        document.getElementById('campo-senha').focus();
    };

    window.voltarParaEscolha = () => {
        document.getElementById('step-escolha').classList.remove('hidden');
        document.getElementById('step-senha').classList.add('hidden');
        document.getElementById('campo-senha').value = '';
    };

    window.validarSenha = () => {
        const senha = document.getElementById('campo-senha').value;
        if ((perfilSelecionado === 'enfermagem' && senha === '1234') || 
            (perfilSelecionado === 'espera' && senha === '2026')) {
            entrarNoSistema();
        } else {
            alert("Senha incorreta!");
        }
    };

    function entrarNoSistema() {
        document.getElementById('tela-login-inicial').classList.add('hidden');
        document.getElementById('main-sistema').classList.remove('hidden');
        document.getElementById('label-acesso').innerText = perfilSelecionado.toUpperCase();
        if(perfilSelecionado === 'enfermagem') document.getElementById('adm-btn-wrapper').classList.remove('hidden');
    }

    window.sairDoSistema = () => location.reload();

    // BUSCA E FIREBASE
    document.getElementById('busca').addEventListener('input', (e) => {
        const termo = e.target.value.toLowerCase();
        const resDiv = document.getElementById('resultado');
        if (unsubscribe) unsubscribe();
        if (termo.length < 3) { resDiv.innerHTML = ""; return; }

        const q = query(collection(db, "alunos"));
        unsubscribe = onSnapshot(q, (snap) => {
            resDiv.innerHTML = "";
            snap.forEach(docSnap => {
                const d = docSnap.data();
                if (d.aluno && d.aluno.toLowerCase().includes(termo)) {
                    const btnContato = (num) => {
                        const l = num ? num.toString().replace(/\D/g, '') : '';
                        if(!l) return '';
                        return `<div class="acoes-contato">
                            <a href="tel:${l}" class="btn-link btn-tel">📞 Ligar</a>
                            <a href="https://wa.me/55${l}" target="_blank" class="btn-link btn-wpp">💬 Whats</a>
                        </div>`;
                    };

                    let cardSaude = '';
                    if (perfilSelecionado === 'enfermagem') {
                        cardSaude = `
                        <div class="card card-saude">
                            <span class="saude-title">⚕️ Saúde e Emergência</span>
                            <span class="label">Contatos</span>
                            <div style="font-size:14px;">${d.CONTATO1_NOME || '-'} ${btnContato(d.CONTATO1)}</div>
                            <div class="alerta-box">
                                <b>Alergias:</b> ${d.ALERGIAS || 'Nenhuma'}<br>
                                <b>Febre:</b> ${d.FEBRE || '-'}
                            </div>
                        </div>`;
                    }

                    resDiv.innerHTML += `
                        <div class="card card-aluno">
                            <span class="label">Aluno(a)</span>
                            <span class="aluno-nome">${d.aluno}</span>
                            <span class="label">Autorizados</span>
                            <div class="grid-auth">
                                <div class="auth-row"><b>1. ${d.autorizado1 || '-'}</b> ${btnContato(d.RETIRAR1_CONTATO)}</div>
                                <div class="auth-row"><b>2. ${d.autorizado2 || '-'}</b> ${btnContato(d.RETIRAR2_CONTATO)}</div>
                            </div>
                        </div>${cardSaude}`;
                }
            });
        });
    });

    // ADMIN
    window.toggleAdmin = () => document.getElementById('painel-adm').classList.toggle('hidden');
    window.importarCSV = function() {
        const file = document.getElementById('csvFile').files[0];
        Papa.parse(file, { header: true, complete: async (res) => {
            for (const item of res.data) { if(item.aluno) await addDoc(collection(db, "alunos"), item); }
            alert("Importado!");
        }});
    };
    window.limparBaseDados = async function() {
        if (confirm("Apagar tudo?")) {
            const snap = await getDocs(collection(db, "alunos"));
            for (const d of snap.docs) await deleteDoc(doc(db, "alunos", d.id));
            alert("Limpo!");
        }
    };
</script>
</body>
</html>
