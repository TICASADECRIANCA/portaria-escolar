<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Segura | Portaria Casa de Criança</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #1a73e8;
            --danger: #d93025;
            --health: #00897b;
            --whatsapp: #25d366;
            --bg: #f8f9fa;
            --white: #ffffff;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 1300px; margin: auto; }
        
        /* Cabeçalho do Sistema com o Novo Nome e Ícone */
        .header-sistema {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .header-sistema h1 {
            font-size: 32px;
            color: var(--primary);
            margin: 0;
            font-weight: 800;
        }
        
        /* Estilização do Ícone SVG (Casa + Cadeado) */
        .icon-casa-cadeado {
            width: 45px;
            height: 45px;
            fill: var(--primary); /* Cor do ícone acompanha a cor primária */
        }

        .search-box { background: var(--white); padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 25px; text-align: center; }
        input[type="text"], input[type="password"] { width: 100%; max-width: 550px; padding: 18px; border: 2px solid #e0e0e0; border-radius: 15px; font-size: 20px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(26,115,232,0.1); }

        .resultado-wrapper { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; animation: fadeIn 0.5s ease; }

        /* Cards */
        .card { background: var(--white); border-radius: 20px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); flex: 1; min-width: 350px; max-width: 600px; box-sizing: border-box; position: relative; }
        .card-aluno { border-top: 10px solid var(--primary); }
        .card-saude { border-top: 10px solid var(--health); }

        /* Labels e Textos */
        .aluno-nome { font-size: 28px; font-weight: 800; color: var(--danger); display: block; text-transform: uppercase; margin: 5px 0; }
        .aluno-turma { font-size: 18px; color: var(--primary); font-weight: bold; display: block; margin-bottom: 15px; }
        .saude-title { font-size: 20px; font-weight: 700; color: var(--health); border-bottom: 2px solid #e0f2f1; padding-bottom: 8px; margin-bottom: 15px; }
        .label { font-size: 11px; text-transform: uppercase; color: #70757a; font-weight: 800; display: block; margin-top: 12px; }
        .data { font-size: 16px; color: #202124; font-weight: 600; display: block; }

        /* Grid de Autorizados */
        .grid-auth { display: grid; gap: 8px; margin-top: 10px; background: #f1f8ff; padding: 15px; border-radius: 12px; }
        .auth-row { border-bottom: 1px solid #d0e3ff; padding: 8px 0; display: flex; flex-direction: column; }
        .auth-row:last-child { border: none; }
        .auth-info { display: flex; justify-content: space-between; align-items: center; width: 100%; }

        /* Botões de Contato */
        .acoes-contato { display: flex; gap: 8px; margin-top: 5px; }
        .btn-link { text-decoration: none; font-size: 11px; font-weight: bold; padding: 5px 10px; border-radius: 8px; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .btn-tel { background: #e8f0fe; color: var(--primary); }
        .btn-wpp { background: #e6fcf0; color: var(--whatsapp); }

        .alerta-box { background: #fff4e5; border: 1px solid #ffe1ba; padding: 15px; border-radius: 12px; margin-top: 15px; }
        .live-tag { position: absolute; top: 10px; right: 20px; color: var(--whatsapp); font-size: 10px; font-weight: bold; }

        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 850px) {
            .header-sistema h1 { font-size: 26px; }
            .icon-casa-cadeado { width: 35px; height: 35px; }
            .card { flex: 1 1 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="search-box">
        <div class="header-sistema">
            <svg class="icon-casa-cadeado" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 3L2 12h3v9h6v-6h2v6h6v-9h3L12 3zm1 11.93c.6.25 1 .84 1 1.57 0 1.1-.9 2-2 2s-2-.9-2-2c0-.73.4-1.32 1-1.57V13c0-.55.45-1 1-1s1 .45 1 1v1.93zM12 10a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/>
                <path d="M17 10h1v2h-1zM6 10h1v2H6z" opacity=".5"/>
                <path d="M11 14h2v3h-2z"/>
                <path d="M12 13a1 1 0 1 0 0 2 1 1 0 0 0 0-2z" fill="#fff"/>
            </svg>
            <h1>Casa Segura</h1>
        </div>
        
        <p style="color: #70757a; margin-top: -10px; margin-bottom: 20px; font-size: 14px;">Portaria Casa de Criança</p>
        
        <input type="text" id="busca" placeholder="🔍 Digite o nome do aluno para consultar...">
        <div style="margin-top: 15px;">
            <button class="btn" style="background:#f1f3f4; color:#666; font-size: 12px;" onclick="toggleAdmin()">⚙️ Área Administrativa</button>
        </div>
    </div>

    <div id="resultado" class="resultado-wrapper"></div>

    <div id="painel-adm" class="hidden" style="text-align:center;">
        <div class="card" style="margin:auto; border: 2px dashed var(--primary); max-width: 500px;">
            <h3>Painel de Controle</h3>
            <div id="admin-auth">
                <input type="password" id="senha-adm" placeholder="Senha do Administrador">
                <button class="btn" style="background:#333; color:white; width:100%; margin-top:10px;" onclick="loginAdm()">Acessar Painel</button>
            </div>
            <div id="import-controls" class="hidden">
                <input type="file" id="csvFile" accept=".csv" style="margin: 20px 0;">
                <button class="btn" style="background:var(--primary); color:white; width:100%;" onclick="importarCSV()">IMPORTAR CSV (UTF-8)</button>
                <button class="btn" style="background:var(--danger); color:white; width:100%; margin-top:20px;" onclick="limparBaseDados()">🔥 LIMPAR TODA A BASE</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC67PDC576cb9FSbwExmG5RTRIaevM0vPE",
        authDomain: "portaria-escolar-f9226.firebaseapp.com",
        projectId: "portaria-escolar-f9226",
        storageBucket: "portaria-escolar-f9226.firebasestorage.app",
        messagingSenderId: "1024003667592",
        appId: "1:1024003667592:web:4faf498c3f39999f75113d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const formatarLinkTel = (num) => num ? num.toString().replace(/\D/g, '') : '';
    let unsubscribe = null;

    window.toggleAdmin = () => document.getElementById('painel-adm').classList.toggle('hidden');
    window.loginAdm = () => {
        if(document.getElementById('senha-adm').value === "admin123") {
            document.getElementById('import-controls').classList.remove('hidden');
            document.getElementById('admin-auth').classList.add('hidden');
        } else { alert("Senha incorreta!"); }
    };

    document.getElementById('busca').addEventListener('input', (e) => {
        const termo = e.target.value.toLowerCase();
        const resDiv = document.getElementById('resultado');
        if (unsubscribe) unsubscribe();
        if (termo.length < 3) { resDiv.innerHTML = ""; return; }

        const q = query(collection(db, "alunos"));
        unsubscribe = onSnapshot(q, (snap) => {
            resDiv.innerHTML = "";
            snap.forEach(docSnap => {
                const d = docSnap.data();
                if (d.aluno && d.aluno.toLowerCase().includes(termo)) {
                    
                    const btnContato = (num) => {
                        const l = formatarLinkTel(num);
                        if(!l) return '';
                        return `<div class="acoes-contato">
                            <a href="tel:${l}" class="btn-link btn-tel">📞 Ligar</a>
                            <a href="https://wa.me/55${l}" target="_blank" class="btn-link btn-wpp">💬 Whats</a>
                        </div>`;
                    };

                    resDiv.innerHTML += `
                        <div class="card card-aluno">
                            <div class="live-tag">● LIVE</div>
                            <span class="label">Aluno(a)</span>
                            <span class="aluno-nome">${d.aluno}</span>
                            <span class="aluno-turma">Turma: ${d.ae || '-'}</span>
                            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                                <div><span class="label">Mãe</span><span class="data">${d.mae || '-'}</span></div>
                                <div><span class="label">Pai</span><span class="data">${d.pai || '-'}</span></div>
                            </div>
                            <span class="label">Autorizados a Retirar</span>
                            <div class="grid-auth">
                                <div class="auth-row"><div class="auth-info"><b>1. ${d.autorizado1 || '-'}</b><span>${d.RETIRAR1_PARENTESCO || ''}</span></div>${btnContato(d.RETIRAR1_CONTATO)}</div>
                                <div class="auth-row"><div class="auth-info"><b>2. ${d.autorizado2 || '-'}</b><span>${d.RETIRAR2_PARENTESCO || ''}</span></div>${btnContato(d.RETIRAR2_CONTATO)}</div>
                                <div class="auth-row"><b>3. ${d.autorizado3 || '-'}</b> ${btnContato(d.RETIRAR3_CONTATO)}</div>
                                <div class="auth-row"><b>4. ${d.autorizado4 || '-'}</b> ${btnContato(d.RETIRAR4_CONTATO)}</div>
                                <div class="auth-row"><b>5. ${d.autorizado5 || '-'}</b> ${btnContato(d.RETIRAR5_CONTATO)}</div>
                            </div>
                        </div>
                        <div class="card card-saude">
                            <div class="saude-title">⚕️ Saúde e Emergência</div>
                            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                                <div><span class="label">Contato 1 (${d.CONTATO1_PARENTESCO || ''})</span><span class="data">${d.CONTATO1_NOME || '-'}</span>${btnContato(d.CONTATO1)}</div>
                                <div><span class="label">Contato 2 (${d.CONTATO2_PARENTESCO || ''})</span><span class="data">${d.CONTATO2_NOME || '-'}</span>${btnContato(d.CONTATO2)}</div>
                            </div>
                            <div style="margin-top:10px; border-top: 1px solid #eee; padding-top: 5px;">
                                <span class="label">Hospital e Plano</span>
                                <span class="data">${d.HOSPITAL_NOME || '-'}</span>
                                <span class="data" style="font-size:14px;">${d.PLANO_DE_SAUDE || '-'} (${d.NUM_PLANO || '-'})</span>
                            </div>
                            <div class="alerta-box">
                                <span class="label" style="color:#a66300; margin:0;">Alergias / Febre</span>
                                <span class="data" style="font-size:14px;"><b>Alergias:</b> ${d.ALERGIAS || 'Nenhuma'}</span>
                                <span class="data" style="color:var(--danger); font-size:14px;"><b>Febre:</b> ${d.FEBRE || '-'}</span>
                            </div>
                        </div>`;
                }
            });
        });
    });

    window.importarCSV = function() {
        const file = document.getElementById('csvFile').files[0];
        Papa.parse(file, { header: true, encoding: "UTF-8", complete: async (res) => {
            for (const item of res.data) { if(item.aluno) await addDoc(collection(db, "alunos"), item); }
            alert("Importação concluída!"); location.reload();
        }});
    };

    window.limparBaseDados = async function() {
        if (confirm("Apagar toda a base de dados?")) {
            const snap = await getDocs(collection(db, "alunos"));
            for (const d of snap.docs) await deleteDoc(doc(db, "alunos", d.id));
            alert("Base limpa!"); location.reload();
        }
    };
</script>
</body>
</html>
