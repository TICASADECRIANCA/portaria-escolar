<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Segura | Portaria Casa de Criança</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --danger: #d93025;
            --health: #00897b;
            --whatsapp: #25d366;
            --bg-overlay: rgba(248, 249, 250, 0.96);
            --white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
            background-color: #dfebf7;
            /* --- SUA IMAGEM DE FUNDO ABAIXO --- */
            background-image: url("NOME_DO_SEU_ARQUIVO.jpg");
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed;
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
        }

        .container { 
            width: 100%; max-width: 1300px; margin: 20px; 
            background: var(--bg-overlay); padding: 25px; border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); backdrop-filter: blur(10px);
        }
        
        #tela-login-inicial {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* Removido o degradê azul, agora usa o fundo do body */
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }

        .login-box { 
            background: var(--white); padding: 40px; border-radius: 24px; 
            text-align: center; width: 90%; max-width: 400px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
        }

        .btn-escolha { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-enfermagem { background: var(--health); color: white; }
        .btn-espera { background: var(--primary); color: white; }
        .btn-voltar-login { background: #f1f3f4; color: #555; margin-top: 15px; }

        .search-box { background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 25px; text-align: center; position: relative; }
        input[type="text"], input[type="password"] { width: 100%; padding: 16px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 18px; outline: none; box-sizing: border-box; }

        .resultado-wrapper { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: var(--white); border-radius: 20px; padding: 22px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); flex: 1; min-width: 350px; max-width: 600px; position: relative; }
        .card-aluno { border-top: 10px solid var(--primary); }
        .card-saude { border-top: 10px solid var(--health); }

        .aluno-nome { font-size: 26px; font-weight: 800; color: var(--danger); display: block; text-transform: uppercase; margin: 5px 0; }
        .label { font-size: 11px; text-transform: uppercase; color: #70757a; font-weight: 800; display: block; margin-top: 10px; }
        .data { font-size: 15px; color: #202124; font-weight: 600; display: block; }

        .grid-auth { display: grid; gap: 8px; margin-top: 10px; background: #f1f8ff; padding: 12px; border-radius: 12px; }
        .auth-row { border-bottom: 1px solid #d0e3ff; padding: 6px 0; }
        .auth-info { display: flex; justify-content: space-between; align-items: center; width: 100%; font-size: 14px; }

        .acoes-contato { display: flex; gap: 6px; margin-top: 4px; }
        .btn-link { text-decoration: none; font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 6px; display: flex; align-items: center; gap: 4px; }
        .btn-tel { background: #e8f0fe; color: var(--primary); }
        .btn-wpp { background: #e6fcf0; color: var(--whatsapp); }

        .alerta-box { background: #fff4e5; border: 1px solid #ffe1ba; padding: 12px; border-radius: 10px; margin-top: 12px; font-size: 13px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="tela-login-inicial">
    <div id="box-escolha" class="login-box">
        <h1 style="color:var(--primary); margin:0 0 25px 0;">Casa Segura</h1>
        <button class="btn-escolha btn-enfermagem" onclick="abrirSenha('enfermagem')">⚕️ ENFERMAGEM</button>
        <button class="btn-escolha btn-espera" onclick="abrirSenha('espera')">🛋️ SALA DE ESPERA</button>
    </div>
    <div id="box-senha" class="login-box hidden">
        <h2 id="txt-perfil">Senha</h2>
        <input type="password" id="input-senha" placeholder="Digite a senha...">
        <button class="btn-escolha btn-espera" style="margin-top:15px;" onclick="conferirSenha()">ENTRAR</button>
        <button class="btn-escolha btn-voltar-login" onclick="voltarEscolha()">← Voltar</button>
    </div>
</div>

<div class="container hidden" id="app-principal">
    <div class="search-box">
        <button onclick="location.reload()" style="position:absolute; top:10px; right:10px; cursor:pointer; border:none; background:#eee; padding:5px 10px; border-radius:5px; font-weight:bold;">🚪 SAIR</button>
        <h2 style="color:var(--primary); margin:0;">Casa Segura</h2>
        <p style="font-size:12px; color:#666; margin-bottom:15px;">Acesso: <b id="label-perfil"></b></p>
        <input type="text" id="busca" placeholder="🔍 Digite o NOME do aluno para buscar...">
        <div id="area-adm" class="hidden" style="margin-top:10px;">
            <button onclick="document.getElementById('painel-adm').classList.toggle('hidden')" style="font-size:10px; cursor:pointer; background:none; border:1px solid #ccc; padding:2px 5px; border-radius:4px;">⚙️ Painel Importar CSV</button>
        </div>
    </div>

    <div id="resultado" class="resultado-wrapper"></div>

    <div id="painel-adm" class="hidden" style="text-align:center; margin-bottom: 20px;">
        <div class="card" style="margin:auto; border: 2px dashed #ccc; max-width: 450px;">
            <h4>Importar CSV (Ajustado para Acentos)</h4>
            <input type="file" id="csvFile" accept=".csv" style="margin-bottom:10px;">
            <button class="btn-escolha btn-espera" onclick="importarCSV()">IMPORTAR</button>
            <button onclick="limparBase()" style="color:red; margin-top:15px; cursor:pointer; background:none; border:none; font-size:11px; font-weight:bold;">Esvaziar Banco de Dados</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC67PDC576cb9FSbwExmG5RTRIaevM0vPE",
        authDomain: "portaria-escolar-f9226.firebaseapp.com",
        projectId: "portaria-escolar-f9226",
        storageBucket: "portaria-escolar-f9226.firebasestorage.app",
        messagingSenderId: "1024003667592",
        appId: "1:1024003667592:web:4faf498c3f39999f75113d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let unsubscribe = null;
    let acessoAtivo = "";

    window.abrirSenha = (p) => { 
        acessoAtivo = p; 
        document.getElementById('box-escolha').classList.add('hidden'); 
        document.getElementById('box-senha').classList.remove('hidden'); 
        document.getElementById('txt-perfil').innerText = p === 'enfermagem' ? '⚕️ Enfermagem' : ' Couch Sala de Espera'; 
        document.getElementById('input-senha').value = "";
    };
    window.voltarEscolha = () => { 
        document.getElementById('box-escolha').classList.remove('hidden'); 
        document.getElementById('box-senha').classList.add('hidden'); 
    };
    window.conferirSenha = () => {
        const s = document.getElementById('input-senha').value;
        if((acessoAtivo === 'enfermagem' && s === '1234') || (acessoAtivo === 'espera' && s === '2026')) {
            document.getElementById('tela-login-inicial').classList.add('hidden');
            document.getElementById('app-principal').classList.remove('hidden');
            document.getElementById('label-perfil').innerText = acessoAtivo.toUpperCase();
            if(acessoAtivo === 'enfermagem') document.getElementById('area-adm').classList.remove('hidden');
        } else { alert("Senha Errada!"); }
    };

    document.getElementById('busca').addEventListener('input', (e) => {
        const termo = e.target.value.toLowerCase();
        const resDiv = document.getElementById('resultado');
        if (unsubscribe) unsubscribe();
        if (termo.length < 3) { resDiv.innerHTML = ""; return; }

        unsubscribe = onSnapshot(query(collection(db, "alunos")), (snap) => {
            resDiv.innerHTML = "";
            snap.forEach(docSnap => {
                const d = docSnap.data();
                if (d.NOME && d.NOME.toLowerCase().includes(termo)) {
                    
                    // LÓGICA DE CONTATO: Só gera botões se for ENFERMAGEM
                    const btnC = (n) => {
                        if (acessoAtivo !== 'enfermagem') return ''; // BLOQUEIO SALA DE ESPERA
                        const num = n ? n.toString().replace(/\D/g, '') : '';
                        return num ? `<div class="acoes-contato"><a href="tel:${num}" class="btn-link btn-tel">📞 Ligar</a><a href="https://wa.me/55${num}" target="_blank" class="btn-link btn-wpp">💬 Whats</a></div>` : '';
                    };

                    let html = `
                        <div class="card card-aluno">
                            <span class="label">Aluno(a)</span>
                            <span class="aluno-nome">${d.NOME}</span>
                            <span class="data" style="color:var(--primary)">Turma: ${d.TURMA || '-'}</span>
                            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                                <div><span class="label">Mãe: ${d.MAE_NOME || '-'}</span>${btnC(d.MAE_ER_CELULAR)}</div>
                                <div><span class="label">Pai: ${d.PAI_NOME || '-'}</span>${btnC(d.PAI_ER_CELULAR)}</div>
                            </div>
                            <span class="label">Autorizados a Retirar</span>
                            <div class="grid-auth">
                                <div class="auth-row"><div class="auth-info"><b>1. ${d.RETIRAR1_NOME || '-'}</b><span>${d.RETIRAR1_PARENTESCO || ''}</span></div>${btnC(d.RETIRAR1_CONTATO)}</div>
                                <div class="auth-row"><div class="auth-info"><b>2. ${d.RETIRAR2_NOME || '-'}</b><span>${d.RETIRAR2_PARENTESCO || ''}</span></div>${btnC(d.RETIRAR2_CONTATO)}</div>
                                <div class="auth-row"><div class="auth-info"><b>3. ${d.RETIRAR3_NOME || '-'}</b><span>${d.RETIRAR3_PARENTESCO || ''}</span></div>${btnC(d.RETIRAR3_CONTATO)}</div>
                                <div class="auth-row"><div class="auth-info"><b>4. ${d.RETIRAR4_NOME || '-'}</b><span>${d.RETIRAR4_PARENTESCO || ''}</span></div>${btnC(d.RETIRAR4_CONTATO)}</div>
                                <div class="auth-row"><div class="auth-info"><b>5. ${d.RETIRAR5_NOME || '-'}</b><span>${d.RETIRAR5_PARENTESCO || ''}</span></div>${btnC(d.RETIRAR5_CONTATO)}</div>
                            </div>
                        </div>`;

                    if (acessoAtivo === 'enfermagem') {
                        html += `
                        <div class="card card-saude">
                            <div class="saude-title" style="color:var(--health); font-weight:bold; border-bottom:1px solid #eee; padding-bottom:5px;">⚕️ Ficha Médica</div>
                            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                                <div><span class="label">Emergência 1 (${d.CONTATO1_PARENTESCO || ''})</span><span class="data">${d.CONTATO1_NOME || '-'}</span></div>
                                <div><span class="label">Emergência 2 (${d.CONTATO2_PARENTESCO || ''})</span><span class="data">${d.CONTATO2_NOME || '-'}</span></div>
                            </div>
                            <span class="label">Hospital e Plano</span>
                            <span class="data">${d.HOSPITAL_NOME || '-'}</span>
                            <span class="data" style="font-size:13px;">${d.PLANO_DE_SAUDE || '-'} (${d.NUM_PLANO || '-'})</span>
                            <div class="alerta-box">
                               <!-- <b>Alergias:</b> ${d.ALERGIAS || 'Não'}<br> -->
                                <b>Detalhes Alergias:</b> ${d.OUTRAS_ALERGIAS_DETALHE || '-'}<br>
                                <b>Restrição Alimentar:</b> ${d.RESTRICAO_ALIMENTAR || 'Não'}<br>
                                <b style="color:var(--danger)">Febre:</b> ${d.FEBRE || '-'}<br>
                                <b>Dor de Cabeça:</b> ${d.DOR_CABECA || '-'}<br>
                                <b>Medicamentos:</b> ${d.INGERE_MEDIC || 'Não'} (${d.INGERE_DESCRICAO || ''})<br>
                                <b>Tratamento:</b> ${d.TRATAMENTO || '-'}
                            </div>
                        </div>`;
                    }
                    resDiv.innerHTML += html;
                }
            });
        });
    });

    window.importarCSV = () => {
        const file = document.getElementById('csvFile').files[0];
        if (!file) return alert("Selecione um arquivo CSV!");
        Papa.parse(file, { header: true, skipEmptyLines: true, encoding: "ISO-8859-1", complete: async (r) => {
            for(const i of r.data) { if(i.NOME) await addDoc(collection(db, "alunos"), i); }
            alert("Importação concluída!");
            location.reload();
        }});
    };

    window.limparBase = async () => { 
        if(confirm("ATENÇÃO: Isso apagará todos os dados de alunos. Confirmar?")) { 
            const s = await getDocs(collection(db, "alunos")); 
            for(const d of s.docs) await deleteDoc(doc(db, "alunos", d.id)); 
            alert("Base de dados esvaziada!"); 
            location.reload();
        } 
    };
</script>
</body>
</html>
