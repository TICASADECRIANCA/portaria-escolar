<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Segura | Portaria Casa de Criança</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --danger: #d93025;
            --health: #00897b;
            --whatsapp: #25d366;
            --bg-overlay: rgba(248, 249, 250, 0.94);
            --white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
            background-color: #dfebf7;
            /* SUBSTITUA PELO NOME DA SUA IMAGEM */
            background-image: url("NOME_DO_SEU_ARQUIVO.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: flex-start;
        }

        .container { 
            width: 100%; max-width: 1300px; margin: 20px; 
            background: var(--bg-overlay); padding: 25px; border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); backdrop-filter: blur(8px);
        }
        
        /* TELAS DE LOGIN */
        #tela-login-inicial {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(26,115,232,0.95) 0%, rgba(162,196,245,0.95) 100%);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-box {
            background: var(--white); padding: 40px; border-radius: 24px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); width: 90%; max-width: 400px;
        }
        .btn-escolha {
            width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 12px;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-enfermagem { background: var(--health); color: white; }
        .btn-espera { background: var(--primary); color: white; }
        .btn-voltar-login { background: #f1f3f4; color: #555; margin-top: 15px; }

        /* INTERFACE */
        .header-sistema { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 15px; }
        .icon-casa-cadeado { width: 40px; height: 40px; fill: var(--primary); }
        .search-box { background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 25px; text-align: center; position: relative; }
        
        input[type="text"], input[type="password"] { 
            width: 100%; padding: 16px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 18px; outline: none; box-sizing: border-box;
        }

        .resultado-wrapper { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: var(--white); border-radius: 20px; padding: 22px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); flex: 1; min-width: 350px; max-width: 600px; position: relative; }
        .card-aluno { border-top: 10px solid var(--primary); }
        .card-saude { border-top: 10px solid var(--health); }

        .aluno-nome { font-size: 26px; font-weight: 800; color: var(--danger); display: block; text-transform: uppercase; margin: 5px 0; }
        .label { font-size: 11px; text-transform: uppercase; color: #70757a; font-weight: 800; display: block; margin-top: 10px; }
        .data { font-size: 15px; color: #202124; font-weight: 600; display: block; }

        .grid-auth { display: grid; gap: 8px; margin-top: 10px; background: #f1f8ff; padding: 12px; border-radius: 12px; }
        .auth-row { border-bottom: 1px solid #d0e3ff; padding: 6px 0; }
        .auth-info { display: flex; justify-content: space-between; align-items: center; width: 100%; font-size: 14px; }

        .acoes-contato { display: flex; gap: 6px; margin-top: 4px; }
        .btn-link { text-decoration: none; font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 6px; display: flex; align-items: center; gap: 4px; }
        .btn-tel { background: #e8f0fe; color: var(--primary); }
        .btn-wpp { background: #e6fcf0; color: var(--whatsapp); }

        .alerta-box { background: #fff4e5; border: 1px solid #ffe1ba; padding: 12px; border-radius: 10px; margin-top: 12px; font-size: 14px; }
        .btn-sair { position: absolute; top: 10px; right: 10px; background: #fee; color: var(--danger); border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="tela-login-inicial">
    <div id="box-escolha" class="login-box">
        <svg class="icon-casa-cadeado" viewBox="0 0 24 24" style="width:60px; margin-bottom:10px;"><path d="M12 3L2 12h3v9h6v-6h2v6h6v-9h3L12 3z"/></svg>
        <h1 style="color:var(--primary); margin:0 0 25px 0;">Casa Segura</h1>
        <button class="btn-escolha btn-enfermagem" onclick="abrirSenha('enfermagem')">⚕️ ENFERMAGEM</button>
        <button class="btn-escolha btn-espera" onclick="abrirSenha('espera')">🛋️ SALA DE ESPERA</button>
    </div>

    <div id="box-senha" class="login-box hidden">
        <h2 id="txt-perfil" style="margin-bottom:20px;">Senha</h2>
        <input type="password" id="input-senha" placeholder="Digite a senha...">
        <button class="btn-escolha btn-espera" style="margin-top:15px;" onclick="conferirSenha()">ENTRAR</button>
        <button class="btn-escolha btn-voltar-login" onclick="voltarEscolha()">← Voltar</button>
    </div>
</div>

<div class="container hidden" id="app-principal">
    <div class="search-box">
        <button class="btn-sair" onclick="location.reload()">🚪 SAIR</button>
        <div class="header-sistema">
            <svg class="icon-casa-cadeado" viewBox="0 0 24 24"><path d="M12 3L2 12h3v9h6v-6h2v6h6v-9h3L12 3z"/></svg>
            <h1>Casa Segura</h1>
        </div>
        <p style="font-size:13px; color:#666;">Acesso: <b id="label-perfil"></b></p>
        <input type="text" id="busca" placeholder="🔍 Buscar nome do aluno...">
        
        <div id="area-adm" class="hidden" style="margin-top:10px;">
            <button onclick="document.getElementById('painel-adm').classList.toggle('hidden')" style="font-size:11px; cursor:pointer;">⚙️ Painel Admin</button>
        </div>
    </div>

    <div id="resultado" class="resultado-wrapper"></div>

    <div id="painel-adm" class="hidden" style="text-align:center; margin-bottom: 20px;">
        <div class="card" style="margin:auto; border: 2px dashed #ccc; max-width: 450px;">
            <h4>Importar Base de Dados</h4>
            <input type="file" id="csvFile" accept=".csv" style="margin-bottom:10px;">
            <button class="btn-escolha btn-espera" onclick="importarCSV()">IMPORTAR CSV</button>
            <button onclick="limparBase()" style="color:red; margin-top:15px; cursor:pointer; background:none; border:none;">Limpar Toda Base</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC67PDC576cb9FSbwExmG5RTRIaevM0vPE",
        authDomain: "portaria-escolar-f9226.firebaseapp.com",
        projectId: "portaria-escolar-f9226",
        storageBucket: "portaria-escolar-f9226.firebasestorage.app",
        messagingSenderId: "1024003667592",
        appId: "1:1024003667592:web:4faf498c3f39999f75113d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let unsubscribe = null;
    let acessoAtivo = "";

    // NAVEGAÇÃO LOGIN
    window.abrirSenha = (p) => {
        acessoAtivo = p;
        document.getElementById('box-escolha').classList.add('hidden');
        document.getElementById('box-senha').classList.remove('hidden');
        document.getElementById('txt-perfil').innerText = p === 'enfermagem' ? '⚕️ Enfermagem' : '🛋️ Sala de Espera';
    };
    window.voltarEscolha = () => {
        document.getElementById('box-escolha').classList.remove('hidden');
        document.getElementById('box-senha').classList.add('hidden');
    };
    window.conferirSenha = () => {
        const s = document.getElementById('input-senha').value;
        if((acessoAtivo === 'enfermagem' && s === '1234') || (acessoAtivo === 'espera' && s === '2026')) {
            document.getElementById('tela-login-inicial').classList.add('hidden');
            document.getElementById('app-principal').classList.remove('hidden');
            document.getElementById('label-perfil').innerText = acessoAtivo.toUpperCase();
            if(acessoAtivo === 'enfermagem') document.getElementById('area-adm').classList.remove('hidden');
        } else { alert("Senha Errada!"); }
    };

    // BUSCA E RENDERIZAÇÃO COMPLETA
    document.getElementById('busca').addEventListener('input', (e) => {
        const termo = e.target.value.toLowerCase();
        const resDiv = document.getElementById('resultado');
        if (unsubscribe) unsubscribe();
        if (termo.length < 3) { resDiv.innerHTML = ""; return; }

        unsubscribe = onSnapshot(query(collection(db, "alunos")), (snap) => {
            resDiv.innerHTML = "";
            snap.forEach(docSnap => {
                const d = docSnap.data();
                if (d.aluno && d.aluno.toLowerCase().includes(termo)) {
                    const btnC = (n) => {
                        const num = n ? n.toString().replace(/\D/g, '') : '';
                        return num ? `<div class="acoes-contato"><a href="tel:${num}" class="btn-link btn-tel">📞 Ligar</a><a href="https://wa.me/55${num}" target="_blank" class="btn-link btn-wpp">💬 Whats</a></div>` : '';
                    };

                    // CARD ALUNO COM OS 5 AUTORIZADOS RESTAURADOS
                    let html = `
                        <div class="card card-aluno">
                            <span class="label">Aluno(a)</span>
                            <span class="aluno-nome">${d.aluno}</span>
                            <span class="aluno-turma">Turma: ${d.ae || '-'}</span>
                            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                                <div><span class="label">Mãe</span><span class="data">${d.mae || '-'}</span></div>
                                <div><span class="label">Pai</span><span class="data">${d.pai || '-'}</span></div>
                            </div>
                            <span class="label">Autorizados a Retirar</span>
                            <div class="grid-auth">
                                <div class="auth-row"><div class="auth-info"><b>1. ${d.autorizado1 || '-'}</b><span>${d.RETIRAR1_PARENTESCO || ''}</span></div>${btnC(d.RETIRAR1_CONTATO)}</div>
                                <div class="auth-row"><div class="auth-info"><b>2. ${d.autorizado2 || '-'}</b><span>${d.RETIRAR2_PARENTESCO || ''}</span></div>${btnC(d.RETIRAR2_CONTATO)}</div>
                                <div class="auth-row"><b>3. ${d.autorizado3 || '-'}</b> ${btnC(d.RETIRAR3_CONTATO)}</div>
                                <div class="auth-row"><b>4. ${d.autorizado4 || '-'}</b> ${btnC(d.RETIRAR4_CONTATO)}</div>
                                <div class="auth-row"><b>5. ${d.autorizado5 || '-'}</b> ${btnC(d.RETIRAR5_CONTATO)}</div>
                            </div>
                        </div>`;

                    // CARD SAÚDE RESTAURADO (Só para Enfermagem)
                    if (acessoAtivo === 'enfermagem') {
                        html += `
                        <div class="card card-saude">
                            <div class="saude-title">⚕️ Saúde e Emergência</div>
                            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                                <div><span class="label">Contato 1 (${d.CONTATO1_PARENTESCO || ''})</span><span class="data">${d.CONTATO1_NOME || '-'}</span>${btnC(d.CONTATO1)}</div>
                                <div><span class="label">Contato 2 (${d.CONTATO2_PARENTESCO || ''})</span><span class="data">${d.CONTATO2_NOME || '-'}</span>${btnC(d.CONTATO2)}</div>
                            </div>
                            <span class="label">Hospital e Plano</span>
                            <span class="data">${d.HOSPITAL_NOME || '-'}</span>
                            <span class="data" style="font-size:13px;">${d.PLANO_DE_SAUDE || '-'} (${d.NUM_PLANO || '-'})</span>
                            <div class="alerta-box">
                                <b>Alergias:</b> ${d.ALERGIAS || 'Nenhuma'}<br>
                                <b style="color:var(--danger)">Febre:</b> ${d.FEBRE || '-'}
                            </div>
                        </div>`;
                    }
                    resDiv.innerHTML += html;
                }
            });
        });
    });

    // ADMIN
    window.importarCSV = () => {
        const file = document.getElementById('csvFile').files[0];
        Papa.parse(file, { header: true, complete: async (r) => {
            for(const i of r.data) { if(i.aluno) await addDoc(collection(db, "alunos"), i); }
            alert("Sucesso!");
        }});
    };
    window.limparBase = async () => {
        if(confirm("Apagar tudo?")) {
            const s = await getDocs(collection(db, "alunos"));
            for(const d of s.docs) await deleteDoc(doc(db, "alunos", d.id));
            alert("Limpo!");
        }
    };
</script>
</body>
</html>
