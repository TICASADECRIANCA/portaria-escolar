<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portaria Pro | Gestão Escolar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #1a73e8;
            --danger: #d93025;
            --health: #00897b;
            --bg: #f8f9fa;
            --white: #ffffff;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 1300px; margin: auto; }
        
        .search-box { background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 25px; text-align: center; }
        input[type="text"], input[type="password"] { width: 100%; max-width: 500px; padding: 15px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 18px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }

        .resultado-wrapper { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; animation: fadeIn 0.5s ease; }

        .card { background: var(--white); border-radius: 20px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); flex: 1; min-width: 350px; max-width: 600px; box-sizing: border-box; }
        
        .card-aluno { border-top: 10px solid var(--primary); }
        .card-saude { border-top: 10px solid var(--health); }

        .aluno-nome { font-size: 18px; font-weight: 800; color: var(--danger); display: block; text-transform: uppercase; margin: 5px 0; }
        .aluno-turma { font-size: 18px; color: var(--primary); font-weight: bold; display: block; margin-bottom: 15px; }
        
        .saude-title { font-size: 20px; font-weight: 700; color: var(--health); border-bottom: 2px solid #e0f2f1; padding-bottom: 8px; margin-bottom: 15px; }

        .label { font-size: 11px; text-transform: uppercase; color: #70757a; font-weight: 800; display: block; margin-top: 12px; }
        .data { font-size: 16px; color: #202124; font-weight: 600; display: block; }
        
        .grid-auth { display: grid; gap: 8px; margin-top: 10px; background: #f1f8ff; padding: 15px; border-radius: 12px; }
        .auth-row { display: flex; justify-content: space-between; border-bottom: 1px solid #d0e3ff; padding: 4px 0; font-size: 14px; }
        .auth-row:last-child { border: none; }

        .alerta-box { background: #fff4e5; border: 1px solid #ffe1ba; padding: 15px; border-radius: 12px; margin-top: 15px; }
        
        /* Botões */
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-danger { background: var(--danger); color: white; margin-top: 20px; width: 100%; }
        .btn-danger:hover { background: #b22222; }
        
        .hidden { display: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 850px) { .card { flex: 1 1 100%; } }
    </style>
</head>
<body>

<div class="container">
    <div class="search-box">
        <h2 style="margin:0 0 10px 0; color: var(--primary);">Portaria Ativa</h2>
        <input type="text" id="busca" placeholder="🔍 Buscar nome do aluno...">
        <div style="margin-top: 10px;">
            <button class="btn" style="background:#eee; font-size: 12px;" onclick="toggleAdmin()">⚙️ Área Administrativa</button>
        </div>
    </div>

    <div id="resultado" class="resultado-wrapper"></div>

    <div id="painel-adm" class="hidden" style="text-align:center;">
        <div class="card" style="margin:auto; border: 2px dashed var(--primary); max-width: 500px;">
            <h3>Painel do Administrador</h3>
            <div id="admin-auth">
                <input type="password" id="senha-adm" placeholder="Senha">
                <button class="btn" style="background:#333; color:white; width:100%; margin-top:10px;" onclick="loginAdm()">Acessar</button>
            </div>
            
            <div id="import-controls" class="hidden">
                <p style="font-size: 14px; color: #666;">Selecione o arquivo CSV (UTF-8) para importar:</p>
                <input type="file" id="csvFile" accept=".csv" style="margin-bottom: 20px;">
                <button class="btn" style="background:var(--primary); color:white; width:100%;" onclick="importarCSV()">EFETUAR IMPORTAÇÃO</button>
                
                <hr style="margin: 30px 0; opacity: 0.2;">
                
                <p style="font-size: 13px; color: var(--danger);"><strong>Atenção:</strong> A ação abaixo apagará TODOS os registros atuais.</p>
                <button class="btn btn-danger" onclick="limparBaseDados()">🔥 LIMPAR TODA A BASE DE DADOS</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC67PDC576cb9FSbwExmG5RTRIaevM0vPE",
        authDomain: "portaria-escolar-f9226.firebaseapp.com",
        projectId: "portaria-escolar-f9226",
        storageBucket: "portaria-escolar-f9226.firebasestorage.app",
        messagingSenderId: "1024003667592",
        appId: "1:1024003667592:web:4faf498c3f39999f75113d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Gestão de Admin
    window.toggleAdmin = () => document.getElementById('painel-adm').classList.toggle('hidden');
    window.loginAdm = () => {
        if(document.getElementById('senha-adm').value === "admin123") {
            document.getElementById('import-controls').classList.remove('hidden');
            document.getElementById('admin-auth').classList.add('hidden');
        } else { alert("Senha incorreta"); }
    };

    // Busca com acentuação e fonte ajustada
    document.getElementById('busca').addEventListener('input', async (e) => {
        const termo = e.target.value.toLowerCase();
        const resDiv = document.getElementById('resultado');
        if (termo.length < 3) { resDiv.innerHTML = ""; return; }

        const q = query(collection(db, "alunos"));
        const snap = await getDocs(q);
        resDiv.innerHTML = "";

        snap.forEach(docSnap => {
            const d = docSnap.data();
            if (d.aluno && d.aluno.toLowerCase().includes(termo)) {
                resDiv.innerHTML += `
                    <div class="card card-aluno">
                        <span class="label">Aluno(a)</span>
                        <span class="aluno-nome">${d.aluno}</span>
                        <span class="aluno-turma">Turma: ${d.ae || '-'}</span>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                            <div><span class="label">Mãe</span><span class="data">${d.mae || '-'}</span></div>
                            <div><span class="label">Pai</span><span class="data">${d.pai || '-'}</span></div>
                        </div>
                        <span class="label">Autorizados a Retirar</span>
                        <div class="grid-auth">
                            <div class="auth-row"><b>${d.autorizado1 || '-'}</b> <span>${d.RETIRAR1_CONTATO || ''}</span></div>
                            <div class="auth-row"><b>${d.autorizado2 || '-'}</b> <span>${d.RETIRAR2_CONTATO || ''}</span></div>
                            <div class="auth-row"><b>${d.autorizado3 || '-'}</b> <span>${d.RETIRAR3_CONTATO || ''}</span></div>
                            <div class="auth-row"><b>${d.autorizado4 || '-'}</b> <span>${d.RETIRAR4_CONTATO || ''}</span></div>
                            <div class="auth-row"><b>${d.autorizado5 || '-'}</b> <span>${d.RETIRAR5_CONTATO || ''}</span></div>
                        </div>
                    </div>
                    <div class="card card-saude">
                        <div class="saude-title">⚕️ Saúde e Emergência</div>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                            <div><span class="label">Contato 1</span><span class="data">${d.CONTATO1_NOME || '-'}</span><span class="data" style="color:var(--primary)">${d.CONTATO1 || ''}</span></div>
                            <div><span class="label">Contato 2</span><span class="data">${d.CONTATO2_NOME || '-'}</span><span class="data" style="color:var(--primary)">${d.CONTATO2 || ''}</span></div>
                        </div>
                        <div style="margin-top:10px; border-top: 1px solid #eee; padding-top: 5px;">
                            <span class="label">Hospital / Plano</span>
                            <span class="data">${d.HOSPITAL_NOME || '-'}</span>
                            <span class="data" style="font-size:14px;">${d.PLANO_DE_SAUDE || '-'} (${d.NUM_PLANO || '-'})</span>
                        </div>
                        <div class="alerta-box">
                            <span class="label" style="color:#a66300; margin:0;">Alergias / Febre</span>
                            <span class="data" style="font-size:14px;"><b>Alergias:</b> ${d.ALERGIAS || 'Nenhuma'}</span>
                            <span class="data" style="color:var(--danger); font-size:14px;"><b>Febre:</b> ${d.FEBRE || '-'}</span>
                        </div>
                    </div>`;
            }
        });
    });

    // Importação
    window.importarCSV = function() {
        const file = document.getElementById('csvFile').files[0];
        if(!file) return alert("Selecione o arquivo!");
        Papa.parse(file, {
            header: true,
            encoding: "UTF-8",
            complete: async (res) => {
                for (const item of res.data) {
                    if(item.aluno) await addDoc(collection(db, "alunos"), item);
                }
                alert("Importação concluída!");
                location.reload();
            }
        });
    };

    // FUNÇÃO PARA LIMPAR BASE DE DADOS
    window.limparBaseDados = async function() {
        if (confirm("VOCÊ TEM CERTEZA? Isso apagará todos os alunos do banco de dados definitivamente!")) {
            const btn = event.target;
            btn.innerText = "⏳ APAGANDO...";
            btn.disabled = true;

            const snap = await getDocs(collection(db, "alunos"));
            const batch = snap.docs.map(d => deleteDoc(doc(db, "alunos", d.id)));
            
            await Promise.all(batch);
            alert("O banco de dados foi limpo!");
            location.reload();
        }
    };
</script>
</body>
</html>
